name: Build & Release

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os:       windows-latest
            name:     Windows
            artifact: BotManager-Windows-Setup.exe

          - os:       macos-latest
            name:     macOS
            artifact: BotManager-macOS.dmg

          - os:       ubuntu-latest
            name:     Linux
            artifact: BotManager-Linux.AppImage

    runs-on: ${{ matrix.os }}
    name:    Build for ${{ matrix.name }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyinstaller psutil pystray pillow

      # WINDOWS
      - name: "[Windows] Build .exe with PyInstaller"
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          FEEDBACK_WEBHOOK: ${{ secrets.FEEDBACK_WEBHOOK }}
        run: |
          pyinstaller --onefile --windowed `
            --icon=icon.ico `
            --name BotManager `
            main.py

      - name: "[Windows] Build installer with Inno Setup"
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item dist\BotManager.exe -Destination BotManager.exe
          New-Item -ItemType Directory -Force -Path installer_output
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" BotManager.iss
          $setup = Get-ChildItem installer_output\*.exe | Select-Object -First 1
          Copy-Item $setup.FullName -Destination "BotManager-Windows-Setup.exe"

      # macOS
      - name: "[macOS] Convert icon to icns"
        if: matrix.os == 'macos-latest'
        run: |
          python3 -c "
          from PIL import Image
          import os
          img = Image.open('icon.ico').convert('RGBA')
          sizes = [16, 32, 64, 128, 256, 512]
          os.makedirs('icon.iconset', exist_ok=True)
          for s in sizes:
              img.resize((s, s)).save(f'icon.iconset/icon_{s}x{s}.png')
          "
          iconutil -c icns icon.iconset -o icon.icns

      - name: "[macOS] Build .app with PyInstaller"
        if: matrix.os == 'macos-latest'
        env:
          FEEDBACK_WEBHOOK: ${{ secrets.FEEDBACK_WEBHOOK }}
        run: |
          pyinstaller --windowed \
            --icon=icon.icns \
            --name BotManager \
            main.py

      - name: "[macOS] Install create-dmg"
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: "[macOS] Create .dmg"
        if: matrix.os == 'macos-latest'
        run: |
          create-dmg \
            --volname "Bot Manager" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "BotManager.app" 175 190 \
            --hide-extension "BotManager.app" \
            --app-drop-link 425 190 \
            "BotManager-macOS.dmg" \
            "dist/BotManager.app"

      # LINUX
      - name: "[Linux] Install system dependencies"
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-tk \
            libgtk-3-dev \
            libappindicator3-dev \
            fuse \
            libfuse2

      - name: "[Linux] Build binary with PyInstaller"
        if: matrix.os == 'ubuntu-latest'
        env:
          FEEDBACK_WEBHOOK: ${{ secrets.FEEDBACK_WEBHOOK }}
        run: |
          pyinstaller --onefile \
            --name BotManager \
            main.py

      - name: "[Linux] Convert icon to PNG"
        if: matrix.os == 'ubuntu-latest'
        run: |
          python3 -c "
          from PIL import Image
          img = Image.open('icon.ico').convert('RGBA')
          img.resize((256, 256)).save('icon.png')
          "

      - name: "[Linux] Package as AppImage"
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp dist/BotManager AppDir/usr/bin/BotManager
          cp icon.png AppDir/usr/share/icons/hicolor/256x256/apps/botmanager.png

          printf '[Desktop Entry]\nName=Discord Bot Manager\nExec=BotManager\nIcon=botmanager\nType=Application\nCategories=Utility;\n' > AppDir/BotManager.desktop

          printf '#!/bin/bash\nexec "$(dirname "$0")/usr/bin/BotManager" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir BotManager-Linux.AppImage

      # SUBIR A LA RELEASE
      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}